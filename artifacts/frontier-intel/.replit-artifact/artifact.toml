kind = "web"
previewPath = "/"
title = "Frontier Intel"
version = "1.0.0"
id = "artifacts/frontier-intel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20534
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/frontier-intel run dev"

[services.env]
PORT = "20534"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/frontier-intel", "run", "build"]
publicDir = "artifacts/frontier-intel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
